<!DOCTYPE html>
<html lang="km">
<head>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>កម្មវិធីអាន និងបកប្រែភាសាចិនវៃឆ្លាត</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>

    <style>
        body { font-family: 'Battambang', sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; transition: background 0.3s; }
        /* Dark Mode Styles */
        body.dark-mode { background-color: #1a1a1a; color: #fff; }
        body.dark-mode .container { background-color: #2d2d2d; }
        body.dark-mode textarea { background: #3d3d3d; color: #fff; border-color: #555; }
        body.dark-mode .section { background: #3d3d3d; color: #eee; }
        body.dark-mode .result-box { background: #3d3d3d; color: #eee; }

        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .theme-toggle { position: absolute; top: 10px; right: 20px; cursor: pointer; padding: 8px; border-radius: 20px; border: none; background: #34495e; color: white; }
        
        .section { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; border-left: 5px solid #3498db; }
        textarea { width: 100%; height: 120px; font-size: 18px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        
        .btn-read { background-color: #e74c3c; }
        .btn-pinyin { background-color: #f39c12; }
        .btn-translate { background-color: #2ecc71; }
        .btn-clear { background-color: #7f8c8d; }
        
        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: #edf2f7; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleDarkMode()">🌓 របៀបយប់/ថ្ងៃ</button>
    <h2>🇨🇳 កម្មវិធីអានភាសាចិនវៃឆ្លាត 🇰🇭</h2>
    
    <div class="section">
        <label>📸 ស្កេនរូបភាព</label>
        <input type="file" id="imageInput" accept="image/*" onchange="scanImage()">
        <div id="ocrStatus" style="color:#7f8c8d; margin-top: 5px;"></div>
    </div>

    <div class="section">
        <textarea id="chineseText" placeholder="បញ្ចូលអក្សរចិន..."></textarea>
        <div class="btn-group">
            <button class="btn-read" onclick="speakChinese()">🔊 អាន</button>
            <button class="btn-pinyin" onclick="generatePinyin()">🔤 ភីនអ៊ិន</button>
            <button class="btn-translate" onclick="translateToKhmer()">🇰🇭 បកប្រែ</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ លុប</button>
        </div>
    </div>

    <div id="resultSection" style="display:none;" class="result-box">
        <label>📍 ភីនអ៊ិន:</label>
        <div id="pinyinResult" style="color:#d35400; font-weight:bold;"></div>
        <hr>
        <label>📍 ន័យខ្មែរ:</label>
        <div id="translateResult"></div>
    </div>
</div>

<script>
    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }
    
    async function scanImage() {
        const fileInput = document.getElementById('imageInput');
        const status = document.getElementById('ocrStatus');
        if (fileInput.files.length === 0) return;
        status.innerText = "⏳ កំពុងដំណើរការ...";
        try {
            const result = await Tesseract.recognize(fileInput.files[0], 'chi_sim');
            document.getElementById('chineseText').value = result.data.text;
            status.innerText = "✅ ជោគជ័យ!";
        } catch (e) { status.innerText = "❌ មានបញ្ហា!"; }
    }

    function clearAll() {
        document.getElementById('chineseText').value = '';
        document.getElementById('resultSection').style.display = "none";
        window.speechSynthesis.cancel();
    }

    function speakChinese() {
        const text = document.getElementById("chineseText").value;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN';
        window.speechSynthesis.speak(u);
    }

    function generatePinyin() {
        const text = document.getElementById("chineseText").value;
        document.getElementById("resultSection").style.display = "block";
        document.getElementById("pinyinResult").innerText = pinyinPro.pinyin(text, { toneType: 'symbol' });
    }

    async function translateToKhmer() {
        const text = document.getElementById("chineseText").value;
        document.getElementById("resultSection").style.display = "block";
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=km&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        document.getElementById("translateResult").innerText = data[0][0][0];
    }
</script>
</body>
</html>
