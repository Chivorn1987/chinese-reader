<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>កម្មវិធីអាន និងបកប្រែភាសាចិនវៃឆ្លាត</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>

    <style>/* បន្ថែមរចនាប័ទ្មសម្រាប់ Background ទង់ជាតិ */
body {
    position: relative;
    min-height: 100vh;
    margin: 0;
    /* ប្រើ Background-image ដាក់ទង់ជាតិពីរជាន់ */
    background: 
        linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), /* ស្រទាប់ស ដើម្បីឱ្យឃើញអក្សរច្បាស់ */
        url('https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_Cambodia.svg'), 
        url('https://upload.wikimedia.org/wikipedia/commons/f/fa/Flag_of_the_People%27s_Republic_of_China.svg');
    background-position: top center, bottom center;
    background-size: 50% 30%, 50% 30%;
    background-repeat: no-repeat, no-repeat;
    background-attachment: fixed;
    opacity: 0.3; /* កម្រិតព្រីលៗ 30% */
}

/* ធានាថា Container នៅពីលើ Background */
.container {
    position: relative;
    z-index: 1;
    background: white; /* ឬពណ៌ផ្សេងដែលអ្នកចូលចិត្ត */
}

        /* CSS Variables for Light/Dark Mode */
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #2c3e50;
            --section-bg: #f8f9fa;
            --border-color: #ccc;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #ecf0f1;
            --section-bg: #3d3d3d;
            --border-color: #555;
        }

        body { font-family: 'Battambang', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; margin: 0; transition: 0.3s; }
        .container { max-width: 700px; margin: 0 auto; background: var(--container-bg); padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .section { margin-bottom: 20px; padding: 15px; background: var(--section-bg); border-radius: 10px; border-left: 5px solid #3498db; }
        .controls-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: rgba(0,0,0,0.05); padding: 8px 12px; border-radius: 6px; }
        
        textarea { width: 100%; height: 120px; font-size: 18px; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); box-sizing: border-box; background: var(--container-bg); color: var(--text-color); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .btn-small { padding: 2px 10px; background: #34495e; color: white; border: none; border-radius: 4px; }
        
        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <button onclick="document.body.classList.toggle('dark-mode')" style="float:right; padding:5px 15px; border-radius:20px; border:none; cursor:pointer;">🌓 របៀបយប់/ថ្ងៃ</button>
    <h2>🇨🇳 កម្មវិធីអាន និងបកប្រែភាសាចិនវៃឆ្លាត 🇰🇭</h2>
    
    <div class="section">
        <label>📸 ស្កេនរូបភាព</label>
        <input type="file" id="imageInput" accept="image/*" onchange="scanImage()">
        <div id="ocrStatus" style="margin-top: 5px; font-size: 14px;"></div>
    </div>

    <div class="section">
        <div class="controls-bar">
            <div>🏃 ល្បឿន: <input type="range" id="speedInput" min="0.5" max="1.5" step="0.25" value="0.75" oninput="document.getElementById('speedLabel').innerText = this.value + 'x'"> <span id="speedLabel">0.75x</span></div>
            <div>🔎 អក្សរ: <button class="btn-small" onclick="changeFontSize(2)">+</button> <button class="btn-small" onclick="changeFontSize(-2)">-</button></div>
        </div>

        <textarea id="chineseText" placeholder="បញ្ចូលអក្សរចិន..."></textarea>
        
        <div class="btn-group">
            <button style="background:#e74c3c" onclick="speakChinese()">🔊 អាន</button>
            <button style="background:#f39c12" onclick="generatePinyin()">🔤 ភីនអ៊ិន</button>
            <button style="background:#2ecc71" onclick="translateToKhmer()">🇰🇭 បកប្រែ</button>
            <button style="background:#7f8c8d" onclick="clearAll()">🗑️ លុប</button>
        </div>
    </div>

    <div id="resultSection" style="display:none;" class="result-box">
        <h3 style="margin-top:0;">📊 លទ្ធផល៖</h3>
        <label style="color:#f39c12;">📍 ភីនអ៊ិន:</label>
        <div id="pinyinResult" style="font-weight:bold; margin-bottom:10px;">-</div>
        <label style="color:#2ecc71;">📍 បកប្រែខ្មែរ:</label>
        <div id="translateResult">-</div>
    </div>
</div>

<script>
    async function scanImage() {
        const file = document.getElementById('imageInput').files[0];
        if (!file) return;
        document.getElementById('ocrStatus').innerText = "⏳ កំពុងស្កេន...";
        const { data: { text } } = await Tesseract.recognize(file, 'chi_sim');
        document.getElementById('chineseText').value = text;
        document.getElementById('ocrStatus').innerText = "✅ ជោគជ័យ!";
    }

    function changeFontSize(val) {
        const t = document.getElementById('chineseText');
        const s = parseInt(window.getComputedStyle(t).fontSize);
        t.style.fontSize = (s + val) + 'px';
    }

    function speakChinese() {
        const u = new SpeechSynthesisUtterance(document.getElementById("chineseText").value);
        u.lang = 'zh-CN';
        u.rate = document.getElementById('speedInput').value;
        window.speechSynthesis.speak(u);
    }

    function generatePinyin() {
        document.getElementById("resultSection").style.display = "block";
        document.getElementById("pinyinResult").innerText = pinyinPro.pinyin(document.getElementById("chineseText").value, { toneType: 'symbol' });
    }

    async function translateToKhmer() {
        document.getElementById("resultSection").style.display = "block";
        const text = document.getElementById("chineseText").value;
        const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=km&dt=t&q=${encodeURIComponent(text)}`);
        const data = await res.json();
        document.getElementById("translateResult").innerText = data[0][0][0];
    }

    function clearAll() {
        document.getElementById('chineseText').value = '';
        document.getElementById('resultSection').style.display = "none";
        window.speechSynthesis.cancel();
    }
</script>
</body>
</html>
