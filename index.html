<!DOCTYPE html>
<html lang="km">
<head>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>កម្មវិធីអាន និងបកប្រែភាសាចិនវៃឆ្លាត</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>

    <style>
        /* កំណត់ទម្រង់អក្សរ Khmer OS Battambang ទៅកាន់គ្រប់ផ្នែកទាំងអស់ */
        body, textarea, button, input, label, h2, h3, span { 
            font-family: 'Battambang', 'Khmer OS Battambang', 'Segoe UI', sans-serif; 
        }

        body { background-color: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        
        .section { margin-bottom: 20px; text-align: left; background: #f8f9fa; padding: 15px; border-radius: 10px; border-left: 5px solid #3498db; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #34495e; }
        
        /* របារឧបករណ៍បន្ថែម */
        .controls-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; font-size: 14px; background: #ebf5fb; padding: 8px 12px; border-radius: 6px; }
        .control-item { display: flex; align-items: center; gap: 8px; }
        .btn-small { padding: 2px 10px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; background-color: #34495e; color: white; font-weight: bold; }
        .btn-small:hover { background-color: #2c3e50; }

        textarea { width: 100%; height: 120px; font-size: 18px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; resize: vertical; transition: font-size 0.2s; }
        input[type="file"] { display: block; margin-top: 5px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        button { flex: 1; min-width: 130px; padding: 12px; font-size: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        
        .btn-read { background-color: #e74c3c; } .btn-read:hover { background-color: #c0392b; }
        .btn-pinyin { background-color: #f39c12; } .btn-pinyin:hover { background-color: #d35400; }
        .btn-translate { background-color: #2ecc71; } .btn-translate:hover { background-color: #27ae60; }
        .btn-clear { background-color: #7f8c8d; } .btn-clear:hover { background-color: #616a6b; }
        
        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: #edf2f7; text-align: left; font-size: 18px; min-height: 40px; white-space: pre-wrap; }
        .pinyin-text { font-family: 'Arial', sans-serif; color: #d35400; font-weight: bold; letter-spacing: 1px; }
        .khmer-text { color: #2c3e50; }
        .loading { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>🇨🇳 កម្មវិធីអាន និងបកប្រែភាសាចិនវៃឆ្លាត 🇰🇭</h2>
    
    <div class="section">
        <label>📸 ជំហានទី ១: ស្កេនអក្សរពីក្នុងរូបភាព (បើមាន)</label>
        <input type="file" id="imageInput" accept="image/*" onchange="scanImage()">
        <div id="ocrStatus" class="loading" style="margin-top: 5px;"></div>
    </div>

    <div class="section">
        <label>✍️ ជំហានទី ២: ពិនិត្យ ឬវាយអក្សរចិននៅទីនេះ</label>
        
        <div class="controls-bar">
            <div class="control-item">
                <span>🏃 ល្បឿនអាន:</span>
                <input type="range" id="speedInput" min="0.5" max="1.5" step="0.25" value="0.75" onchange="updateSpeedLabel()">
                <span id="speedLabel">0.75x</span>
            </div>
            <div class="control-item">
                <span>🔎 ទំហំអក្សរ:</span>
                <button class="btn-small" onclick="changeFontSize(2)">+</button>
                <button class="btn-small" onclick="changeFontSize(-2)">-</button>
            </div>
        </div>

        <textarea id="chineseText" placeholder="បញ្ចូលអក្សរចិន... (ឧទាហរណ៍៖ 📝 祝អ្នកជោគជ័យ)"></textarea>
        
        <div class="btn-group">
            <button class="btn-read" onclick="speakChinese()">🔊 អានសំឡេង</button>
            <button class="btn-pinyin" onclick="generatePinyin()">🔤 បង្ហាញភីនអ៊ិន</button>
            <button class="btn-translate" onclick="translateToKhmer()">🇰🇭 បកប្រែខ្មែរ</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ លុបទាំងអស់</button>
        </div>
    </div>

    <div id="resultSection" style="display:none;">
        <h3 style="text-align:left; color:#2c3e50;">📊 លទ្ធផលសង្ខេប៖</h3>
        <div class="result-box">
            <label style="color:#f39c12;">📍 ភីនអ៊ិន (Pinyin):</label>
            <div id="pinyinResult" class="pinyin-text">-</div>
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
            <label style="color:#2ecc71;">📍 ន័យជាភាសាខ្មែរ:</label>
            <div id="translateResult" class="khmer-text">-</div>
        </div>
    </div>
</div>

<script>
// ១. មុខងារស្កេនរូបភាព (OCR)
async function scanImage() {
    const fileInput = document.getElementById('imageInput');
    const ocrStatus = document.getElementById('ocrStatus');
    const chineseText = document.getElementById('chineseText');

    if (fileInput.files.length === 0) return;

    ocrStatus.innerText = "⏳ កំពុងស្កេនរូបភាព និងស្រង់អក្សរចិន... សូមរង់ចាំមួយភ្លែត។";
    
    try {
        const result = await Tesseract.recognize(fileInput.files[0], 'chi_sim');
        chineseText.value = result.data.text;
        ocrStatus.innerText = "✅ ស្កេនជោគជ័យ!";
    } catch (error) {
        ocrStatus.innerText = "❌ មានបញ្ហាក្នុងការស្កេនរូបភាព។";
        console.error(error);
    }
}

// មុខងារបង្ហាញលេខល្បឿនអាន
function updateSpeedLabel() {
    const speed = document.getElementById('speedInput').value;
    document.getElementById('speedLabel').innerText = speed + "x";
}

// មុខងារពង្រីក/បង្រួមអក្សរ
function changeFontSize(action) {
    const textarea = document.getElementById('chineseText');
    let currentSize = window.getComputedStyle(textarea, null).getPropertyValue('font-size');
    let newSize = parseFloat(currentSize) + action;
    if (newSize >= 14 && newSize <= 32) {
        textarea.style.fontSize = newSize + 'px';
    }
}

// មុខងារលុបទិន្នន័យទាំងអស់ (Clear All)
function clearAll() {
    document.getElementById('chineseText').value = '';
    document.getElementById('imageInput').value = '';
    document.getElementById('ocrStatus').innerText = '';
    document.getElementById('pinyinResult').innerText = '-';
    document.getElementById('translateResult').innerText = '-';
    document.getElementById('resultSection').style.display = "none";
    window.speechSynthesis.cancel();
}

// ២. មុខងារអានសំឡេងភាសាចិន (Speech)
function speakChinese() {
    let text = document.getElementById("chineseText").value;
    if(!text.trim()) { alert("សូមបញ្ចូលអក្សរចិនជាមុនសិន!"); return; }

    window.speechSynthesis.cancel();
    
    let utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN'; 
    
    let speed = document.getElementById('speedInput').value;
    utterance.rate = speed; 
    
    window.speechSynthesis.speak(utterance);
}

// ៣. មុខងារបំប្លែងជាភីនអ៊ិន (Pinyin)
function generatePinyin() {
    let text = document.getElementById("chineseText").value;
    if(!text.trim()) { alert("សូមបញ្ចូលអក្សរចិនជាមុនសិន!"); return; }

    document.getElementById("resultSection").style.display = "block";
    const pinyinResult = pinyinPro.pinyin(text, { toneType: 'symbol' }); 
    document.getElementById("pinyinResult").innerText = pinyinResult;
}

// ៤. មុខងារបកប្រែជាភាសាខ្មែរ (Translation)
async function translateToKhmer() {
    let text = document.getElementById("chineseText").value;
    if(!text.trim()) { alert("សូមបញ្ចូលអក្សរចិនជាមុនសិន!"); return; }

    document.getElementById("resultSection").style.display = "block";
    document.getElementById("translateResult").innerText = "⏳ កំពុងបកប្រែ...";

    try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=km&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        const data = await response.json();
        
        let translatedText = "";
        data[0].forEach(item => { if(item[0]) translatedText += item[0]; });

        document.getElementById("translateResult").innerText = translatedText;
    } catch (error) {
        document.getElementById("translateResult").innerText = "❌ មិនអាចបកប្រែបានទេ (សូមពិនិត្យអ៊ីនធឺណិតរបស់អ្នក)។";
        console.error(error);
    }
}
</script>

</body>
</html>
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">
            <label style="color:#2ecc71;">📍 ន័យជាភាសាខ្មែរ:</label>
            <div id="translateResult" class="khmer-text">-</div>
        </div>
    </div>
</div>

<script>
// ១. មុខងារស្កេនរូបភាព (OCR)
async function scanImage() {
    const fileInput = document.getElementById('imageInput');
    const ocrStatus = document.getElementById('ocrStatus');
    const chineseText = document.getElementById('chineseText');

    if (fileInput.files.length === 0) return;

    ocrStatus.innerText = "⏳ កំពុងស្កេនរូបភាព និងស្រង់អក្សរចិន... សូមរង់ចាំមួយភ្លែត។";
    
    try {
        // ប្រើប្រាស់ Tesseract.js ស្កេនរកភាសាចិនសាមញ្ញ (chi_sim)
        const result = await Tesseract.recognize(fileInput.files[0], 'chi_sim');
        chineseText.value = result.data.text;
        ocrStatus.innerText = "✅ ស្កេនជោគជ័យ!";
    } catch (error) {
        ocrStatus.innerText = "❌ មានបញ្ហាក្នុងការស្កេនរូបភាព។";
        console.error(error);
    }
}

// ២. មុខងារអានសំឡេងភាសាចិន (Speech)
function speakChinese() {
    let text = document.getElementById("chineseText").value;
    if(!text.trim()) { alert("សូមបញ្ចូលអក្សរចិនជាមុនសិន!"); return; }

    let utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN'; 
    utterance.rate = 0.75; // ល្បឿនអានយឺតល្មមស្តាប់ទាន់
    window.speechSynthesis.speak(utterance);
}

// ៣. មុខងារបំប្លែងជាភីនអ៊ិន (Pinyin)
function generatePinyin() {
    let text = document.getElementById("chineseText").value;
    if(!text.trim()) { alert("សូមបញ្ចូលអក្សរចិនជាមុនសិន!"); return; }

    document.getElementById("resultSection").style.display = "block";
    // ប្រើបណ្ណាល័យ pinyinPro ដើម្បីបំប្លែង
    const pinyinResult = pinyinPro.pinyin(text, { toneType: 'symbol' }); 
    document.getElementById("pinyinResult").innerText = pinyinResult;
}

// ៤. មុខងារបកប្រែជាភាសាខ្មែរ (Translation)
async function translateToKhmer() {
    let text = document.getElementById("chineseText").value;
    if(!text.trim()) { alert("សូមបញ្ចូលអក្សរចិនជាមុនសិន!"); return; }

    document.getElementById("resultSection").style.display = "block";
    document.getElementById("translateResult").innerText = "⏳ កំពុងបកប្រែ...";

    try {
        // ប្រើប្រាស់ API បកប្រែឥតគិតថ្លៃចិនទៅខ្មែរ
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=km&dt=t&q=${encodeURIComponent(text)}`;
        const response = await fetch(url);
        const data = await response.json();
        
        let translatedText = "";
        data[0].forEach(item => { if(item[0]) translatedText += item[0]; });

        document.getElementById("translateResult").innerText = translatedText;
    } catch (error) {
        document.getElementById("translateResult").innerText = "❌ មិនអាចបកប្រែបានទេ (សូមពិនិត្យអ៊ីនធឺណិតរបស់អ្នក)។";
        console.error(error);
    }
}
</script>

</body>
</html>
