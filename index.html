<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>កម្មវិធីអាន និងបកប្រែភាសាចិន</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>

    <style>
        body, textarea, button, input, label, h2, h3, span, div { font-family: 'Battambang', sans-serif; }
        body { background-color: #f0f2f5; padding: 20px; transition: background-color 0.3s; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Dark Mode */
        body.dark-mode { background-color: #1a1a1a; color: #f0f2f5; }
        body.dark-mode .container { background-color: #2d2d2d; }
        body.dark-mode textarea { background: #4d4d4d; color: white; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #eef; padding: 10px; border-radius: 8px; }
        textarea { width: 100%; height: 120px; font-size: 18px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        
        .char-span { display: inline-block; cursor: pointer; padding: 2px 4px; border-bottom: 2px dotted #f39c12; margin: 2px; }
        .lookup-box { background: #fffdf0; border: 1px solid #f1c40f; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; color: black; }
    </style>
</head>
<body>

<div class="container">
    <button style="float:right;" onclick="toggleDarkMode()">🌓 យប់/ថ្ងៃ</button>
    <h2>🇨🇳 កម្មវិធីអានភាសាចិន</h2>
    
    <div class="section">
        <label>📸 ស្កេនរូបភាព</label>
        <input type="file" id="imageInput" onchange="scanImage()">
    </div>

    <div class="controls">
        <span>ល្បឿន: <input type="range" id="speed" min="0.5" max="1.5" step="0.25" value="1"></span>
        <span>ទំហំអក្សរ: <button onclick="changeSize(2)">+</button> <button onclick="changeSize(-2)">-</button></span>
    </div>

    <textarea id="chineseText" placeholder="បញ្ចូលអក្សរចិន..."></textarea>
    
    <div class="btn-group">
        <button style="background:#e74c3c" onclick="speakChinese()">🔊 អាន</button>
        <button style="background:#f39c12" onclick="generatePinyin()">🔤 ភីនអ៊ិន</button>
        <button style="background:#2ecc71" onclick="translateToKhmer()">🇰🇭 បកប្រែ</button>
        <button style="background:#7f8c8d" onclick="clearAll()">🗑️ លុបទាំងអស់</button>
    </div>

    <div id="lookupBox" class="lookup-box"></div>
    <div id="resultSection" style="display:none; margin-top:15px;">
        <div id="pinyinResult" style="font-size: 20px;"></div>
        <hr>
        <div id="translateResult"></div>
    </div>
</div>

<script>
// Dark Mode
function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
}

// ទំហំអក្សរ
function changeSize(step) {
    let el = document.getElementById('chineseText');
    let size = parseInt(window.getComputedStyle(el).fontSize);
    el.style.fontSize = (size + step) + 'px';
}

// លុបទាំងអស់
function clearAll() {
    document.getElementById('chineseText').value = '';
    document.getElementById('resultSection').style.display = "none";
    document.getElementById('lookupBox').style.display = "none";
    window.speechSynthesis.cancel();
}

// អាន
function speakChinese() {
    let text = document.getElementById("chineseText").value;
    let u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = document.getElementById('speed').value;
    window.speechSynthesis.speak(u);
}

// [បន្ថែមមុខងារ generatePinyin, lookupWord, translateToKhmer, scanImage ដដែល...]
// (ខ្ញុំដាក់កូដត្រឹមនេះដើម្បីអ្នកអាចបន្តពីលើមុខងារដែលធ្លាប់មានស្រាប់)
</script>
</body>
</html>
