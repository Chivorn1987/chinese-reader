<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>កម្មវិធីអាន និងបកប្រែភាសាចិនវៃឆ្លាត</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>

    <style>
        body, textarea, button, input, label, h2, h3, span, div { font-family: 'Battambang', sans-serif; }
        body { background-color: #f0f2f5; padding: 20px; margin: 0; transition: background-color 0.3s; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        /* Dark Mode */
        body.dark-mode { background-color: #1a1a1a; color: #f0f2f5; }
        body.dark-mode .container { background-color: #2d2d2d; }
        body.dark-mode textarea { background: #4d4d4d; color: white; border: 1px solid #666; }
        body.dark-mode .result-box { background: #3a3a3a; color: #ecf0f1; }
        body.dark-mode .section { background: #3d3d3d; border-left: 5px solid #2980b9; }

        .theme-switch { position: absolute; top: 25px; right: 30px; cursor: pointer; background: #34495e; color: white; border: none; padding: 8px 12px; border-radius: 20px; }
        .section { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; border-left: 5px solid #3498db; }
        textarea { width: 100%; height: 120px; padding: 10px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        
        .char-span { display: inline-block; cursor: pointer; padding: 2px 4px; border-bottom: 2px dotted #f39c12; margin: 2px; }
        .lookup-box { background: #fffdf0; border: 1px solid #f1c40f; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; color: black; }
        body.dark-mode .lookup-box { background: #444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-switch" onclick="toggleDarkMode()">🌓 របៀបយប់/ថ្ងៃ</button>
    <h2>🇨🇳 កម្មវិធីអាន និងបកប្រែភាសាចិន</h2>
    
    <div class="section">
        <label>📸 ស្កេនរូបភាព</label>
        <input type="file" id="imageInput" accept="image/*" onchange="scanImage()">
        <div id="ocrStatus"></div>
    </div>

    <div class="section">
        <label>✍️ អក្សរចិន</label>
        <textarea id="chineseText" placeholder="បញ្ចូលអក្សរចិន..."></textarea>
        <div class="btn-group">
            <button style="background:#e74c3c" onclick="speakChinese()">🔊 អាន</button>
            <button style="background:#f39c12" onclick="generatePinyin()">🔤 ភីនអ៊ិន</button>
            <button style="background:#2ecc71" onclick="translateToKhmer()">🇰🇭 បកប្រែ</button>
            <button style="background:#9b59b6" onclick="saveToHistory()">💾 រក្សាទុក</button>
        </div>
    </div>

    <div id="lookupBox" class="lookup-box"></div>
    <div id="resultSection" style="display:none;" class="result-box">
        <div id="pinyinResult" style="font-size: 20px;"></div>
        <hr>
        <div id="translateResult"></div>
    </div>
</div>

<script>
window.onload = () => {
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
};

function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
}

async function scanImage() {
    const file = document.getElementById('imageInput').files[0];
    if (!file) return;
    document.getElementById('ocrStatus').innerText = "⏳ កំពុងស្កេន...";
    const result = await Tesseract.recognize(file, 'chi_sim');
    document.getElementById('chineseText').value = result.data.text;
    document.getElementById('ocrStatus').innerText = "✅ ស្កេនរួចរាល់!";
}

function generatePinyin() {
    let text = document.getElementById("chineseText").value;
    document.getElementById("resultSection").style.display = "block";
    const container = document.getElementById("pinyinResult");
    container.innerHTML = "";
    for (let char of text) {
        if (/[\u4e00-\u9fa5]/.test(char)) {
            let p = pinyinPro.pinyin(char, { toneType: 'symbol' });
            let span = document.createElement("span");
            span.className = "char-span";
            span.innerHTML = `${char}<sub style="font-size:10px">${p}</sub>`;
            span.onclick = () => lookupWord(char, p);
            container.appendChild(span);
        } else container.appendChild(document.createTextNode(char));
    }
}

async function lookupWord(word, pinyin) {
    const box = document.getElementById("lookupBox");
    box.style.display = "block";
    box.innerHTML = `កំពុងស្វែងរក...`;
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=km&dt=t&q=${encodeURIComponent(word)}`);
    const data = await res.json();
    box.innerHTML = `🔍 <b>${word}</b> [${pinyin}] <br> ន័យ: ${data[0][0][0]}`;
}

function speakChinese() {
    let text = document.getElementById("chineseText").value;
    let u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    window.speechSynthesis.speak(u);
}

async function translateToKhmer() {
    let text = document.getElementById("chineseText").value;
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=km&dt=t&q=${encodeURIComponent(text)}`);
    const data = await res.json();
    document.getElementById("translateResult").innerText = data[0][0][0];
}
</script>
</body>
                                                                                     </html>
